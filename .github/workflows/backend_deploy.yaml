name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          
          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
          
          cd worker/
          
          # ✅ 修复 1: 使用 cat + here-doc 替代 printf，更好地保留多行格式和特殊字符
          cat > wrangler.toml << 'EOF'
          ${{ secrets.BACKEND_TOML }}
          EOF
          
          # ✅ 修复 2: 验证文件生成成功，避免因配置错误导致后续失败
          if [ ! -f wrangler.toml ] || [ ! -s wrangler.toml ]; then
            echo "❌ Error: wrangler.toml is empty or not created"
            exit 1
          fi
          echo "✅ wrangler.toml created successfully"
          
          pnpm install --no-frozen-lockfile

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            
            # ✅ 修复 3: patch 失败时立即退出，防止部署错误的版本
            if ! git apply ../.github/config/mail-parser-wasm-worker.patch; then
              echo "❌ Failed to apply mail-parser-wasm-worker patch"
              exit 1
            fi
            echo "✅ Applied mail-parser-wasm-worker patch"
          fi

          # ✅ 修复 4: 即使不是 debug 模式，也保留足够的错误输出便于排查问题
          if [ "$debug_mode" = "true" ]; then
            echo "Debug mode enabled - showing full output"
            pnpm run deploy
          else
            echo "Deploying..."
            pnpm run deploy
            echo "✅ Deployed successfully for tag ${{ github.ref_name }}"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
